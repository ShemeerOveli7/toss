<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorpion Toss</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #111, #000);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: white;
    overflow: hidden;
    touch-action: manipulation;
}

h2 {
    margin-bottom: 20px;
}

/* Scene */
.scene {
    width: 220px;
    height: 220px;
    perspective: 1200px;
}

/* Coin */
.coin {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 2.2s cubic-bezier(0.2, 0.7, 0.3, 1);
}

/* Faces */
.face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    backface-visibility: hidden;
    background-size: cover;
    background-position: center;
    box-shadow:
        inset 0 0 12px rgba(0,0,0,0.7),
        0 10px 25px rgba(0,0,0,0.9);
}

/* HEADS */
.heads {
    background-image: url('heads_coin_webp.webp');
    transform: rotateY(0deg);
}

/* TAILS */
.tails {
    background-image: url('tails_coin_webp.webp');
    transform: rotateY(180deg);
}

/* Button */
button {
    margin-top: 30px;
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    background: #444;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* Result */
#result {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>🦂 Scorpion Cricket Club</h2>

<div class="scene">
    <div class="coin" id="coin">
        <div class="face heads"></div>
        <div class="face tails"></div>
    </div>
</div>

<button onclick="flipCoin()">Flip Coin</button>

<div id="result">Tap to Toss</div>

<script>
let currentSide = 0;
let currentRotation = 0;
let isFlipping = false;

function flipCoin() {
    if (isFlipping) return; // prevent spam clicks
    isFlipping = true;

    const coin = document.getElementById("coin");
    const result = document.getElementById("result");

    result.innerText = "Flipping...";

    const nextSide = Math.random() < 0.5 ? 0 : 1;
    const spins = Math.floor(Math.random() * 3) + 5;

    const sideDiff = nextSide - currentSide;

    currentRotation += (spins * 360) + (sideDiff * 180);

    coin.style.transform = `rotateY(${currentRotation}deg)`;

    currentSide = nextSide;

    setTimeout(() => {
        result.innerText = currentSide === 0 ? "HEADS 🪙" : "TAILS 🪙";
        isFlipping = false;

        // vibration (mobile)
        if (navigator.vibrate) navigator.vibrate(100);

    }, 2200);
}

// Tap anywhere except button
document.body.addEventListener("click", (e) => {
    if (e.target.tagName !== "BUTTON") {
        flipCoin();
    }
});

// Register service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
