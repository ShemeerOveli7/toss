<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorpion Toss</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #111, #000);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: white;
}

h2 {
    margin-bottom: 20px;
}

/* Scene */
.scene {
    width: 220px;
    height: 220px;
    perspective: 1200px;
}

/* Coin */
.coin {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 2.2s cubic-bezier(0.2, 0.7, 0.3, 1);
}

/* Faces */
.face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    backface-visibility: hidden;

    background-size: cover;
    background-position: center;

    box-shadow:
        inset 0 0 12px rgba(0,0,0,0.7),
        0 10px 25px rgba(0,0,0,0.9);
}

/* HEADS */
.heads {
    background-image: url('heads_coin_webp.webp');
    transform: rotateY(0deg);
}

/* TAILS */
.tails {
    background-image: url('tails_coin_webp.webp');
    transform: rotateY(180deg);
}

/* Button */
button {
    margin-top: 30px;
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    background: #444;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* Result */
#result {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>🦂 Scorpion Cricket Club</h2>

<div class="scene">
    <div class="coin" id="coin">
        <div class="face heads"></div>
        <div class="face tails"></div>
    </div>
</div>

<button onclick="flipCoin()">Flip Coin</button>

<div id="result">Tap to Toss</div>
<script>
// Keep track of which side is currently facing up (0 = Heads, 1 = Tails)
let currentSide = 0; 
let currentRotation = 0;

function flipCoin() {
    const coin = document.getElementById("coin");
    const result = document.getElementById("result");

    result.innerText = "Flipping...";

    // 1. Determine the outcome (0 for Heads, 1 for Tails)
    const nextSide = Math.random() < 0.5 ? 0 : 1;

    // 2. Figure out how many extra full spins to do (5 to 7 spins)
    const extraSpins = Math.floor(Math.random() * 3) + 5; 
    
    // 3. Calculate the degrees needed to get to the next side
    // If we are on Heads (0) and want Tails (1), we need 180 deg.
    // If we are on Tails (1) and want Heads (0), we need -180 deg (or +180).
    const sideDifference = nextSide - currentSide;
    
    // 4. Add the massive spins + the side difference to the total rotation
    currentRotation += (extraSpins * 360) + (sideDifference * 180);

    // Apply the CSS transform
    coin.style.transform = `rotateY(${currentRotation}deg)`;

    // Update our tracking variable for the next flip
    currentSide = nextSide;

    // 5. Uncommented and fixed your timeout to match the 2.2s CSS transition
    setTimeout(() => {
        result.innerText = (currentSide === 0) ? "HEADS 🪙" : "TAILS 🪙";
    }, 2200);
}

// Tap anywhere except button
document.body.addEventListener("click", (e) => {
    if (e.target.tagName !== "BUTTON") {
        flipCoin();
    }
});
</script>
</body>
</html>
