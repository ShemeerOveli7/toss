<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorpion Toss</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #111, #000);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: white;
}

/* Coin UI */
.scene {
    width: 220px;
    height: 220px;
    perspective: 1200px;
}

.coin {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 2.2s cubic-bezier(0.2, 0.7, 0.3, 1);
}

.face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    backface-visibility: hidden;
    background-size: cover;
    background-position: center;
}

.heads {
    background-image: url('heads_coin_webp.webp');
}

.tails {
    background-image: url('tails_coin_webp.webp');
    transform: rotateY(180deg);
}

/* Buttons */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: #444;
    color: white;
}

/* INSTALL POPUP */
#installPopup {
    display: none;
    position: fixed;
    bottom: 20px;
    background: #222;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
}

#installPopup button {
    margin-top: 10px;
    background: #0a84ff;
}
</style>
</head>

<body>

<h2>🦂 Scorpion Cricket Club</h2>

<div class="scene">
    <div class="coin" id="coin">
        <div class="face heads"></div>
        <div class="face tails"></div>
    </div>
</div>

<button onclick="flipCoin()">Flip Coin</button>

<div id="result">Tap to Toss</div>

<!-- INSTALL POPUP -->
<div id="installPopup">
    <div>📲 Install Scorpion Toss</div>
    <button onclick="installApp()">Install</button>
</div>

<script>
let currentSide = 0;
let currentRotation = 0;
let deferredPrompt;

// COIN LOGIC
function flipCoin() {
    const coin = document.getElementById("coin");
    const result = document.getElementById("result");

    result.innerText = "Flipping...";

    const nextSide = Math.random() < 0.5 ? 0 : 1;
    const spins = Math.floor(Math.random() * 3) + 5;

    currentRotation += (spins * 360) + ((nextSide - currentSide) * 180);

    coin.style.transform = `rotateY(${currentRotation}deg)`;
    currentSide = nextSide;

    setTimeout(() => {
        result.innerText = currentSide === 0 ? "HEADS 🪙" : "TAILS 🪙";
    }, 2200);
}

// INSTALL PROMPT (ANDROID)
window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;

    // Show popup after delay
    setTimeout(() => {
        document.getElementById("installPopup").style.display = "block";
    }, 3000);
});

// INSTALL BUTTON CLICK
function installApp() {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();

    deferredPrompt.userChoice.then(choice => {
        if (choice.outcome === "accepted") {
            console.log("Installed");
        }
        deferredPrompt = null;
        document.getElementById("installPopup").style.display = "none";
    });
}

// iPhone fallback
if (/iphone|ipad|ipod/i.test(navigator.userAgent)) {
    setTimeout(() => {
        alert("Tap Share → Add to Home Screen");
    }, 3000);
}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
